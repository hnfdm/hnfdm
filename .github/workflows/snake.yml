name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: hnfdm
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2358A6FF&color_dots[0]=%230D1117&color_dots[2]=%231F6FEB&color_dots[3]=%2358A6FF&color_dots[4]=%23A5D6FF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2358A6FF

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
