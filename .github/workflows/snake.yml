name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: hnfdm
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%2358A6FF&color_dots=%23ebedf0,%23dbeafe,%2393c5fd,%233b82f6,%231d4ed8
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2358A6FF&color_dots=%23161b22,%230c2d6b,%231F6FEB,%2358A6FF,%23A5D6FF

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
